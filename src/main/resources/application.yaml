server:
  port: 8080
spring:
  application:
    name: demoAI
  ai:
    vectorstore:
      qdrant:
        host: localhost
        port: 6334
        collection-name: my_collection
        initialize-schema: true  # 自动创建集合
    # 如果你用 OpenAI 做 Embedding
    zhipuai:
      api-key: ${ZHIPU_API_KEY:}
      embedding:
        options:
          model: embedding-2  # Kimi Embedding 模型
      chat:
        options:
          model: glm-4  # 对话模型